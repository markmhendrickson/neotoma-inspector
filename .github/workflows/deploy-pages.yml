name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Custom domains (e.g. inspector.neotoma.io) are served at /. Default Pages URL is
      # https://<user>.github.io/<repo>/ — set repo variable VITE_PUBLIC_BASE_PATH to /
      # when using a root custom domain (see inspector README).
      - name: Build site
        env:
          VITE_NEOTOMA_ENV: prod
          # inspector.neotoma.io should come up pointed at the public sandbox by default.
          # A repo variable can still override this for alternate hosted deployments.
          VITE_NEOTOMA_API_URL: ${{ vars.VITE_NEOTOMA_API_URL || 'https://sandbox.neotoma.io' }}
          VITE_PUBLIC_BASE_PATH: ${{ vars.VITE_PUBLIC_BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Add SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
